server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro static: /blog/post → /blog/post/index.html
    location / {
        try_files $uri $uri/ =404;
    }

    # Hashed build assets are immutable → cache hard
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Self-hosted fonts → long cache
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/rss+xml application/xml font/woff2;
}
